name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install pyinstaller

      - name: Gerar EXE
        run: pyinstaller --onefile --windowed --name "Intelbras_Storage_Calculator" calculator.py

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: Intelbras_Storage_Calculator
          path: dist\Intelbras_Storage_Calculator.exe
